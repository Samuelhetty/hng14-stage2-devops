name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:

# A failure in any stage blocks all downstream stages via 'needs:'
jobs:

  # Lint
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python linting with flake8
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Lint Python (api)
        run: flake8 api/main.py --max-line-length=120
      - name: Lint Python (worker)
        run: flake8 worker/worker.py --max-line-length=120

      # JavaScript linting with eslint
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Lint JavaScript
        run: cd frontend && npx eslint app.js

      # Dockerfile linting with hadolint
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  # Test
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install -r api/tests/requirements-test.txt
      - name: Run pytest with coverage
        run: |
          cd api
          pytest tests/ --cov=. --cov-report=xml --cov-report=term -v
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # Build
  build:
    runs-on: ubuntu-latest
    needs: test
    # Local registry runs as a service container within this job
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      - name: Build and push all images
        run: |
          SHA=${{ github.sha }}
          for svc in api worker frontend; do
            echo "Building $svc..."
            docker build \
              -t localhost:5000/${svc}:${SHA} \
              -t localhost:5000/${svc}:latest \
              ./${svc}
            docker push localhost:5000/${svc}:${SHA}
            docker push localhost:5000/${svc}:latest
            echo "Pushed localhost:5000/${svc}:${SHA}"
          done

  # Security Scan
  security-scan:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      # Rebuild locally (registry doesn't persist between jobs on free tier)
      - name: Rebuild images for scanning
        run: |
          for svc in api worker frontend; do
            docker build -t localhost:5000/${svc}:latest ./${svc}
          done

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "localhost:5000/api:latest"
          format: "sarif"
          output: "trivy-api.sarif"
          severity: "CRITICAL"
          ignore-unfixed: true
          exit-code: "0"

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "localhost:5000/worker:latest"
          format: "sarif"
          output: "trivy-worker.sarif"
          severity: "CRITICAL"
          ignore-unfixed: true
          exit-code: "0"

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "localhost:5000/frontend:latest"
          format: "sarif"
          output: "trivy-frontend.sarif"
          severity: "CRITICAL"
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        if: always()   # upload even if scan fails so you can see what was found
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  # Integration Test
  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=ci_test_password
          APP_ENV=production
          API_URL=http://api:8000
          EOF

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for API healthy
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 40); do
            printf "  attempt %d/40: " $i
            if curl -sf http://localhost:8000/health; then
              echo "API ready"
              break
            fi
            if [ $i -eq 40 ]; then
              echo "API never became healthy"
              docker compose logs api
              docker compose logs redis
              exit 1
            fi
            sleep 5
          done

      - name: Wait for Frontend healthy
        run: |
          echo "Waiting for Frontend..."y
        
          for i in $(seq 1 20); do
            printf "  attempt %d/20: " $i
            if curl -sf http://localhost:3000/health; then
              echo "Frontend ready"
              break
            fi
            if [ $i -eq 20 ]; then
              echo "Frontend never became healthy"
              docker compose logs frontend
              exit 1
            fi
            sleep 5
          done

      - name: Submit job and poll for completion
        run: |
          JOB_ID=$(curl -sf -X POST http://localhost:8000/jobs | jq -r '.job_id')
          echo "Submitted job: $JOB_ID"
          for i in $(seq 1 30); do
            STATUS=$(curl -sf http://localhost:8000/jobs/$JOB_ID | jq -r '.status')
            echo "  poll $i/30: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 2
          done
          echo "Job did not complete"
          docker compose logs worker
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans

  # Deploy (main branch only)
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/hng14-stage2-devops

            # Pull latest code
            git pull origin main

            # Rolling update — bring up new containers
            docker compose pull || true
            docker compose up --build -d --no-deps --scale api=2 api || true

            # Wait for new api container to be healthy (max 60s)
            echo "Waiting for health check..."
            timeout 60 bash -c '
              until docker compose ps api | grep -E "healthy"; do
                sleep 3
              done
            ' || {
              echo "Health check failed — aborting, old container still running"
              exit 1
            }

            # Full stack update now that api is confirmed healthy
            docker compose up --build -d

            echo "Deploy complete!"
